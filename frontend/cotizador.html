<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicForgeX — Cotizador</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #04020f;
    --bg2:      #08051c;
    --surface:  #0d0922;
    --surface2: #130d2e;
    --border:   #2a1f5a;
    --border2:  #3d2d80;
    --violet:   #8b5cf6;
    --purple:   #a855f7;
    --lilac:    #c4b5fd;
    --blue:     #3b82f6;
    --cyan:     #67e8f9;
    --green:    #22c55e;
    --red:      #ef4444;
    --text:     #ede9fe;
    --muted:    #6b5fa8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 10%, rgba(139,92,246,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 85%, rgba(59,130,246,0.07) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(139,92,246,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none; z-index:0;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 44px 22px 100px;
    position: relative; z-index:1;
  }

  /* ── HEADER ── */
  .header {
    text-align:center;
    margin-bottom: 52px;
    animation: fadeDown 0.9s cubic-bezier(.16,1,.3,1) both;
  }
  .logo-img {
    width: 110px;
    height: 110px;
    object-fit: contain;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 18px rgba(139,92,246,0.35));
    animation: pulse-logo 4s ease infinite;
  }
  @keyframes pulse-logo {
    0%,100% { filter: drop-shadow(0 0 18px rgba(139,92,246,0.35)); }
    50%      { filter: drop-shadow(0 0 32px rgba(139,92,246,0.6)); }
  }
  .header-sub {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px,4.5vw,42px);
    font-weight: 900;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, var(--lilac), var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom: 10px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }

  /* ── STEPS ── */
  .steps-nav {
    display:flex;
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    background: var(--surface);
    margin-bottom: 10px;
    animation: fadeUp 0.7s 0.15s cubic-bezier(.16,1,.3,1) both;
  }
  .step-tab {
    flex:1; padding:12px 6px; text-align:center;
    font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
    letter-spacing:0.05em; text-transform:uppercase;
    color:var(--muted);
    border-right:1px solid var(--border);
    transition:all 0.3s ease; position:relative; overflow:hidden;
  }
  .step-tab:last-child { border-right:none; }
  .step-tab::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,var(--violet),var(--blue));
    transform:scaleX(0); transition:transform 0.3s ease;
  }
  .step-tab.active { color:var(--lilac); background:var(--surface2); }
  .step-tab.active::after { transform:scaleX(1); }
  .step-tab.done { color:var(--violet); }
  .step-tab.done .sn::after { content:' ✓'; font-size:10px; }
  .sn { display:block; font-size:17px; font-weight:900; margin-bottom:3px; }

  .progress-bar {
    height:2px; background:var(--border); border-radius:1px;
    margin-bottom:40px; overflow:hidden;
  }
  .progress-fill {
    height:100%;
    background:linear-gradient(90deg,var(--violet),var(--blue),var(--cyan));
    border-radius:1px;
    transition:width 0.55s cubic-bezier(.16,1,.3,1);
    box-shadow:0 0 8px rgba(139,92,246,0.55);
  }

  /* ── CARD ── */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:30px 28px; margin-bottom:18px;
    position:relative; overflow:hidden;
    animation:fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,var(--violet),var(--blue),transparent);
    opacity:0.55;
  }
  .card-label {
    font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
    letter-spacing:0.25em; text-transform:uppercase; color:var(--violet);
    margin-bottom:13px; display:flex; align-items:center; gap:10px;
  }
  .card-label::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg,var(--border2),transparent);
  }
  .card h2 {
    font-family:'Orbitron',monospace;
    font-size:clamp(14px,2.2vw,18px); font-weight:700;
    margin-bottom:24px; letter-spacing:0.02em; color:var(--text);
  }

  /* ── OPTION BUTTONS ── */
  .option-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px;
  }
  .option-btn {
    background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    padding:20px 16px; cursor:pointer;
    transition:all 0.22s cubic-bezier(.16,1,.3,1);
    text-align:left; color:var(--text); font-family:'Rajdhani',sans-serif;
    position:relative; overflow:hidden;
  }
  .option-btn:hover {
    border-color:var(--violet); transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(139,92,246,0.14);
  }
  .option-btn.selected {
    border-color:var(--purple);
    background:rgba(139,92,246,0.09);
    box-shadow:0 0 22px rgba(139,92,246,0.18);
  }
  .opt-icon { font-size:26px; margin-bottom:10px; display:block; }
  .opt-name {
    font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
    margin-bottom:6px; color:var(--lilac); letter-spacing:0.06em;
  }
  .opt-desc { font-size:12px; color:var(--muted); line-height:1.5; font-weight:500; }
  .opt-price {
    margin-top:11px; font-size:11px; color:var(--cyan);
    font-weight:600; font-family:'Orbitron',monospace;
  }

  /* ── COMPLEXITY SLIDER ── */
  .complexity-row {
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
  }
  .comp-btn {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px;
    padding:16px 14px; cursor:pointer; text-align:center;
    transition:all 0.22s ease; color:var(--text); font-family:'Rajdhani',sans-serif;
  }
  .comp-btn:hover { border-color:var(--blue); }
  .comp-btn.selected {
    border-color:var(--blue); background:rgba(59,130,246,0.09);
    box-shadow:0 0 18px rgba(59,130,246,0.15);
  }
  .comp-icon { font-size:22px; margin-bottom:8px; display:block; }
  .comp-name {
    font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
    color:var(--lilac); letter-spacing:0.05em; margin-bottom:4px;
  }
  .comp-desc { font-size:11px; color:var(--muted); line-height:1.4; }
  .comp-mult { margin-top:8px; font-size:11px; color:var(--cyan); font-family:'Orbitron',monospace; }

  /* ── TOGGLE EXTRAS ── */
  .toggle-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px;
  }
  .toggle-item {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px;
    padding:13px 15px; cursor:pointer; transition:all 0.2s ease;
    display:flex; align-items:center; gap:11px; color:var(--text);
  }
  .toggle-item:hover { border-color:var(--violet); background:rgba(139,92,246,0.05); }
  .toggle-item.selected {
    border-color:var(--violet); background:rgba(139,92,246,0.08);
    box-shadow:0 0 14px rgba(139,92,246,0.12);
  }
  .toggle-check {
    width:19px; height:19px; border:1px solid var(--border2); border-radius:5px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; flex-shrink:0; transition:all 0.2s;
    font-family:'Orbitron',monospace;
  }
  .toggle-item.selected .toggle-check {
    background:linear-gradient(135deg,var(--violet),var(--blue));
    border-color:transparent; color:white;
    box-shadow:0 0 10px rgba(139,92,246,0.4);
  }
  .toggle-name {
    font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600;
  }
  .toggle-price { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ── PAGES SLIDER ── */
  .slider-wrap { margin-top:6px; }
  .slider-labels {
    display:flex; justify-content:space-between;
    font-size:11px; color:var(--muted); margin-bottom:11px;
    font-family:'Orbitron',monospace; letter-spacing:0.04em;
  }
  input[type=range] {
    -webkit-appearance:none; width:100%; height:3px;
    background:var(--border); border-radius:2px; outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:linear-gradient(135deg,var(--violet),var(--blue));
    box-shadow:0 0 14px rgba(139,92,246,0.55); cursor:pointer;
    border:2px solid var(--bg); transition:transform 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.2); }
  .slider-value {
    text-align:center; margin-top:14px;
    font-family:'Orbitron',monospace; font-size:20px; font-weight:700;
    background:linear-gradient(135deg,var(--violet),var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  /* ── NAV BUTTONS ── */
  .nav-row {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:28px; gap:14px;
  }
  .btn {
    font-family:'Orbitron',monospace; font-size:10px; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    padding:13px 26px; border-radius:8px; border:none;
    cursor:pointer; transition:all 0.22s ease; position:relative; overflow:hidden;
  }
  .btn-ghost {
    background:transparent; border:1px solid var(--border2); color:var(--muted);
  }
  .btn-ghost:hover { border-color:var(--violet); color:var(--lilac); }
  .btn-primary {
    background:linear-gradient(135deg,var(--violet),var(--blue));
    color:white; box-shadow:0 0 22px rgba(139,92,246,0.28);
  }
  .btn-primary::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,var(--purple),var(--cyan));
    opacity:0; transition:opacity 0.3s;
  }
  .btn-primary:hover::before { opacity:1; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 0 32px rgba(139,92,246,0.45); }
  .btn-primary span { position:relative; z-index:1; }
  .btn-primary:disabled { opacity:0.22; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ── RESULT ── */
  .result-card {
    border:1px solid var(--violet); border-radius:20px; overflow:hidden;
    background:var(--surface);
    box-shadow:0 0 55px rgba(139,92,246,0.1),0 0 110px rgba(59,130,246,0.06);
    animation:fadeUp 0.7s cubic-bezier(.16,1,.3,1) both; position:relative;
  }
  .result-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent 5%,var(--violet) 30%,var(--cyan) 70%,transparent 95%);
  }
  .result-header {
    padding:36px 30px 28px; text-align:center;
    background:linear-gradient(180deg,rgba(139,92,246,0.07) 0%,transparent 100%);
    border-bottom:1px solid var(--border);
  }
  .result-logo {
    width:70px; height:70px; object-fit:contain; margin-bottom:12px;
    filter:drop-shadow(0 0 12px rgba(139,92,246,0.4));
  }
  .result-tag {
    font-family:'Orbitron',monospace; font-size:9px;
    letter-spacing:0.25em; color:var(--violet); margin-bottom:10px;
  }
  .result-header h2 {
    font-family:'Orbitron',monospace; font-size:clamp(16px,2.8vw,22px); font-weight:900;
    letter-spacing:0.03em;
    background:linear-gradient(135deg,var(--lilac),var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:6px;
  }
  .result-header p {
    font-size:13px; color:var(--muted); font-weight:500; letter-spacing:0.04em;
  }

  /* Price breakdown */
  .price-section { padding:28px 30px; }
  .price-block-title {
    font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
    letter-spacing:0.2em; text-transform:uppercase; color:var(--violet);
    margin-bottom:14px; margin-top:24px; display:flex; align-items:center; gap:10px;
  }
  .price-block-title:first-child { margin-top:0; }
  .price-block-title::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg,var(--border2),transparent);
  }

  .price-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 0; border-bottom:1px solid rgba(42,31,90,0.5); font-size:14px;
  }
  .price-row:last-of-type { border-bottom:none; }
  .price-row .lbl { color:var(--muted); font-weight:500; letter-spacing:0.02em; }
  .price-row .val {
    font-family:'Orbitron',monospace; font-size:12px; font-weight:600;
    color:var(--text); letter-spacing:0.04em; text-align:right;
  }
  .price-row.accent .val { color:var(--lilac); }
  .price-row.accent2 .val { color:var(--cyan); }
  .price-row.total-row {
    border:1px solid var(--border2); border-radius:10px; padding:14px 16px;
    margin-top:8px; background:var(--bg2);
  }
  .price-row.total-row .lbl {
    font-family:'Orbitron',monospace; font-size:10px; color:var(--lilac); font-weight:700;
  }
  .price-row.total-row .val {
    font-size:14px;
    background:linear-gradient(135deg,var(--violet),var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 8px rgba(139,92,246,0.35));
  }

  .divider-h {
    height:1px; background:var(--border); margin:20px 0;
  }

  /* Monthly box */
  .monthly-box {
    background:rgba(59,130,246,0.07); border:1px solid rgba(59,130,246,0.25);
    border-radius:12px; padding:18px 20px; margin-top:8px;
    display:flex; justify-content:space-between; align-items:center; gap:16px;
    flex-wrap:wrap;
  }
  .monthly-left .ml-label {
    font-family:'Orbitron',monospace; font-size:9px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--muted); margin-bottom:6px;
  }
  .monthly-left .ml-price {
    font-family:'Orbitron',monospace; font-size:clamp(20px,3.5vw,28px); font-weight:900;
    background:linear-gradient(135deg,var(--blue),var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 10px rgba(103,232,249,0.3));
  }
  .monthly-left .ml-sub { font-size:12px; color:var(--muted); margin-top:4px; font-weight:500; }
  .monthly-includes {
    font-size:12px; color:var(--muted); line-height:1.7; font-weight:500; text-align:right;
  }
  .monthly-includes span { display:block; }
  .monthly-includes span::before { content:'✓ '; color:var(--blue); }

  /* Note */
  .note-box {
    background:rgba(139,92,246,0.05); border:1px solid rgba(139,92,246,0.18);
    border-radius:10px; padding:15px 18px;
    font-size:13px; color:var(--lilac); margin-top:18px;
    line-height:1.7; font-weight:500;
  }
  .note-box strong { color:var(--cyan); }

  /* WhatsApp button */
  .wa-btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:18px;
    background:linear-gradient(135deg,#128c7e,#25d366);
    color:white; border:none; border-radius:12px; cursor:pointer;
    font-family:'Orbitron',monospace; font-size:12px; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    box-shadow:0 0 28px rgba(37,211,102,0.25);
    transition:all 0.25s ease; text-decoration:none;
    margin-top:20px;
  }
  .wa-btn:hover {
    transform:translateY(-2px); box-shadow:0 0 44px rgba(37,211,102,0.4);
    background:linear-gradient(135deg,#0eab99,#2ee87a);
  }
  .wa-icon { font-size:22px; }

  .result-actions {
    padding:20px 30px 28px;
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .btn-outline {
    background:transparent; border:1px solid var(--border2); color:var(--muted);
    font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
    letter-spacing:0.1em; padding:12px 22px; border-radius:8px; cursor:pointer;
    transition:all 0.2s; text-transform:uppercase;
  }
  .btn-outline:hover { border-color:var(--violet); color:var(--lilac); }

  /* Steps hidden */
  .step-section { display:none; }
  .step-section.active { display:block; }

  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-22px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(22px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @media(max-width:600px) {
    .option-grid { grid-template-columns:1fr 1fr; }
    .toggle-grid { grid-template-columns:1fr 1fr; }
    .complexity-row { grid-template-columns:1fr; }
    .steps-nav { display:none; }
    .card { padding:20px 16px; }
    .price-section { padding:20px 18px; }
    .monthly-box { flex-direction:column; align-items:flex-start; }
    .monthly-includes { text-align:left; }
  }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
</style>
</head>
